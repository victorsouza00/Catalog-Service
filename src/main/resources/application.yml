spring:
  application:
    name: catalog-service
  lifecycle:
    timeout-per-shutdown-phase: 15000
  config:
    import: "optional:configserver:"
  cloud:
    config:
      enabled: false
      request-connect-timeout: 5000
      request-read-timeout: 5000
      fail-fast: true
      retry:
        max-attempts: 6
        initial-interval: 1000
        max-interval: 2000
        multiplier: 1.1
  datasource:
    url: jdbc:postgresql://localhost:5432/polardb_catalog
    username: user
    password: password
    hikari:
      connection-timeout: 2000
      maximum-pool-size: 5


server:
  port: 9001
  shutdown: graceful
  tomcat:
    connection-timeout: 2000
    keep-alive-timeout: 15000
    threads:
      max: 50
      min-spare: 5

management:
  endpoints:
    web:
      exposure:
        include: refresh
